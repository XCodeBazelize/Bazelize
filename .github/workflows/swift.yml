name: Swift

on: 
  push:
    branches: 
      - master
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - '.github/workflows/**'
      - 'Package.swift'
  pull_request:
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - '.github/workflows/**'
      - 'Package.swift'

concurrency: 
  group: ci
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: swiftformat --lint
        run: |
          swiftformat --lint --config .swiftformat .
  build:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v6

    - name: Check Cocoapod Version
      run: pod --version

    - name: Check Cocoapod Path
      run: which pod

    - name: Update Cocoapod Repo
      run: pod repo update

    # - name: Get Pod Spec
    #   run: pod spec cat --regex Bagel --version=1.4.0

    - name: Check Xcode Version
      run: |
        xcodebuild -version
        swift --version
        swift package --version

    - name: Get swift version
      run: swift --version # Swift 5.3.3

    - name: SPM Cache
      uses: actions/cache@v5
      with:
        path: .build
        key: ${{ runner.os }}-macos-26-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-macos-26-spm-

    - name: Build
      run: make build

    - name: Run tests
      run: make test

  artifact:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: SPM Cache
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build Bazelize
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Upload Bazelize
        uses: actions/upload-artifact@v7
        with:
          name: bazelize
          path: .build/apple/Products/Release/bazelize
          if-no-files-found: ignore # 'warn' or 'ignore' 

  IntegrateIOS:
    runs-on: macos-26
    needs: [artifact]
    steps:
      - uses: actions/checkout@v6

      - name: Bazel iOS Cache
        uses: actions/cache@v5
        with:
          path: fixture/iOS/cache
          key: ${{ runner.os }}-IntegrateIOS-fixture-ios-${{ hashFiles('**/fixture/iOS/WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-IntegrateIOS-fixture-ios-

      - name: Download Bazelize
        uses: actions/download-artifact@v8
        with:
          name: bazelize

      - name: Check
        run: |
          ls -l
          pwd
          chmod +x bazelize

      - name: Bazel Generation
        working-directory: fixture/iOS
        run: |
          ../../bazelize --project Example.xcodeproj

      - name: Update SPM Deps
        working-directory: fixture/iOS
        run: |
          bazel mod tidy

      - name: Build Application
        working-directory: fixture/iOS
        run: |
          bazel build Example
      
      - name: Copy IPA
        working-directory: fixture/iOS
        run: |
          cp bazel-bin/Example/Example.ipa .

      - name: Unit Test
        working-directory: fixture/iOS
        run: |
          bazel test ExampleTests Framework1Tests Framework2Tests Framework3Tests

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: iOS_Example.ipa
          path: fixture/iOS/Example.ipa
          if-no-files-found: ignore # 'warn' or 'ignore' 
 
